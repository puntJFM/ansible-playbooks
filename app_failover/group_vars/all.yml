---
validate_certs: false

autosys_pause_enabled: true
autosys_resume_enabled: true
autosys_job_selector: "APP_BOX"

dbi_status_endpoint: "{{ dbi_api_url }}/switchover/status"
dbi_context_endpoint: "{{ dbi_api_url }}/switchover/context"
dbi_precheck_endpoint: "{{ dbi_api_url }}/switchover/precheck"
dbi_validate_endpoint: "{{ dbi_api_url }}/switchover/validate"
dbi_primary_endpoint: "{{ dbi_api_url }}/switchover/primary"
change_event_endpoint: "{{ dbi_api_url }}/change/{{ sf_ticket }}/events"

cyberark_account_endpoint: >-
  {{ ccp_url }}/AIMWebService/api/Accounts
  ?AppID={{ ccp_app_id | urlencode }}
  &Safe={{ ca_safe | urlencode }}
  &UserName={{ ccp_username | urlencode }}
